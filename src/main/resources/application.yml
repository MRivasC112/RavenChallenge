# =============================================================================
# Shared Configuration — Employee Service
# =============================================================================

server:
  port: 8080

spring:
  profiles:
    active: dev

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Pagination defaults
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  # Jackson date serialization
  jackson:
    date-format: dd-MM-yyyy
    serialization:
      write-dates-as-timestamps: false

# Custom employee configuration
employee:
  minimum-age: 18
  search:
    min-length: 3
  name:
    validation-regex: "^[\\p{L} '\\-]+$"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info

# Application info for version endpoint
app:
  version: '@project.version@'
  build-timestamp: '@maven.build.timestamp@'
